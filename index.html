<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 気流シミュレーター</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #111827;
      --card: #1f2937;
      --accent: #06b6d4;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 280px 1fr;
      width: 100vw;
      height: 100vh;
      min-width: 1280px;
    }

    #sidebar {
      background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
      padding: 14px;
      overflow-y: auto;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.28);
    }

    h3 {
      font-size: 14px;
      letter-spacing: 0.04em;
      margin: 0 0 10px;
      color: #d1d5db;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input[type="number"] {
      width: 100%;
      background: #0b1220;
      border: 1px solid #374151;
      color: var(--text);
      border-radius: 6px;
      padding: 6px;
      font-size: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="radio"], input[type="checkbox"] {
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #082f49;
      background: var(--accent);
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .danger {
      background: var(--danger);
      color: white;
    }

    .secondary {
      background: #475569;
      color: #f8fafc;
    }

    .muted {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    #viewport {
      position: relative;
    }

    #fps {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #67e8f9;
      border: 1px solid rgba(103, 232, 249, 0.4);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      min-width: 80px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="card">
        <h3>物体を追加</h3>
        <div class="row">
          <label><input type="radio" name="shape" value="box" checked> Box</label>
          <label><input type="radio" name="shape" value="sphere"> Sphere</label>
          <label><input type="radio" name="shape" value="cylinder"> Cylinder</label>
        </div>
        <button id="addObject">追加</button>
      </div>

      <div class="card">
        <h3>選択中の物体</h3>
        <label>Position</label>
        <div class="grid3">
          <input id="posX" type="number" step="0.1" value="0">
          <input id="posY" type="number" step="0.1" value="0">
          <input id="posZ" type="number" step="0.1" value="0">
        </div>
        <label>Scale</label>
        <div class="grid3">
          <input id="scaleX" type="number" step="0.1" min="0.1" value="1">
          <input id="scaleY" type="number" step="0.1" min="0.1" value="1">
          <input id="scaleZ" type="number" step="0.1" min="0.1" value="1">
        </div>
        <button id="deleteObject" class="danger">削除</button>
      </div>

      <div class="card">
        <h3>風の設定</h3>
        <label>方位角: <span id="azimuthLabel">180°</span></label>
        <input id="azimuth" type="range" min="0" max="360" value="180">
        <label>仰角: <span id="elevationLabel">0°</span></label>
        <input id="elevation" type="range" min="-90" max="90" value="0">
        <label>風速: <span id="speedLabel">50</span></label>
        <input id="windSpeed" type="range" min="0" max="100" value="50">
      </div>

      <div class="card">
        <h3>可視化</h3>
        <div class="row">
          <label><input id="showParticles" type="checkbox" checked> パーティクル</label>
        </div>
        <div class="row">
          <label>粒子数</label>
          <input id="particleCount" type="number" min="500" max="2000" step="100" value="1000">
        </div>
        <div class="row"><label><input id="showStreamlines" type="checkbox" checked> 流線</label></div>
        <div class="row"><label><input id="showVelocity" type="checkbox" checked> 速度ヒートマップ</label></div>
        <div class="row"><label><input id="showPressure" type="checkbox"> 圧力ヒートマップ</label></div>
      </div>

      <div class="card">
        <h3>シミュレーション</h3>
        <button id="toggleSim">⏸ 一時停止</button>
        <div style="height:8px"></div>
        <button id="resetSim" class="secondary">↺ リセット</button>
      </div>
    </aside>

    <main id="viewport">
      <div id="fps">FPS: 0</div>
    </main>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { TransformControls } from 'https://unpkg.com/three@0.163.0/examples/jsm/controls/TransformControls.js';

    const GRID = 64;
    const WORLD_SIZE = 40;
    const HALF_WORLD = WORLD_SIZE * 0.5;
    const DT = 0.06;

    class FluidSolver {
      constructor(n) {
        this.n = n;
        this.size = n * n;
        this.u = new Float32Array(this.size);
        this.v = new Float32Array(this.size);
        this.uNext = new Float32Array(this.size);
        this.vNext = new Float32Array(this.size);
        this.p = new Float32Array(this.size);
        this.div = new Float32Array(this.size);
        this.solid = new Uint8Array(this.size);
      }
      idx(i, j) { return i + j * this.n; }
      clampI(i) { return Math.max(0, Math.min(this.n - 1, i)); }
      sample(field, x, z) {
        const n = this.n;
        const gx = ((x + HALF_WORLD) / WORLD_SIZE) * (n - 1);
        const gz = ((z + HALF_WORLD) / WORLD_SIZE) * (n - 1);
        const i0 = this.clampI(Math.floor(gx));
        const j0 = this.clampI(Math.floor(gz));
        const i1 = this.clampI(i0 + 1);
        const j1 = this.clampI(j0 + 1);
        const tx = gx - i0;
        const tz = gz - j0;
        const a = field[this.idx(i0, j0)] * (1 - tx) + field[this.idx(i1, j0)] * tx;
        const b = field[this.idx(i0, j1)] * (1 - tx) + field[this.idx(i1, j1)] * tx;
        return a * (1 - tz) + b * tz;
      }
      setSolidFromMeshes(meshes) {
        this.solid.fill(0);
        const temp = new THREE.Vector3();
        for (let j = 0; j < this.n; j++) {
          for (let i = 0; i < this.n; i++) {
            const x = (i / (this.n - 1)) * WORLD_SIZE - HALF_WORLD;
            const z = (j / (this.n - 1)) * WORLD_SIZE - HALF_WORLD;
            temp.set(x, 0, z);
            for (const mesh of meshes) {
              const box = new THREE.Box3().setFromObject(mesh);
              if (box.containsPoint(temp)) {
                this.solid[this.idx(i, j)] = 1;
                break;
              }
            }
          }
        }
      }
      addWind(wx, wz, strength) {
        const relax = 0.045 + strength * 0.001;
        for (let j = 0; j < this.n; j++) {
          for (let i = 0; i < this.n; i++) {
            const id = this.idx(i, j);
            if (this.solid[id]) { this.u[id] = 0; this.v[id] = 0; continue; }
            this.u[id] += (wx - this.u[id]) * relax;
            this.v[id] += (wz - this.v[id]) * relax;
          }
        }
      }
      advect(dt) {
        const n = this.n;
        const cell = WORLD_SIZE / (n - 1);
        for (let j = 0; j < n; j++) {
          for (let i = 0; i < n; i++) {
            const id = this.idx(i, j);
            if (this.solid[id]) { this.uNext[id] = 0; this.vNext[id] = 0; continue; }
            const x = (i / (n - 1)) * WORLD_SIZE - HALF_WORLD;
            const z = (j / (n - 1)) * WORLD_SIZE - HALF_WORLD;
            const backX = x - this.u[id] * dt * cell * 2.0;
            const backZ = z - this.v[id] * dt * cell * 2.0;
            this.uNext[id] = this.sample(this.u, backX, backZ);
            this.vNext[id] = this.sample(this.v, backX, backZ);
          }
        }
        this.u.set(this.uNext);
        this.v.set(this.vNext);
      }
      project(iter = 24) {
        const n = this.n;
        const h = WORLD_SIZE / (n - 1);
        for (let j = 1; j < n - 1; j++) {
          for (let i = 1; i < n - 1; i++) {
            const id = this.idx(i, j);
            if (this.solid[id]) { this.div[id] = 0; this.p[id] = 0; continue; }
            const uR = this.solid[this.idx(i + 1, j)] ? 0 : this.u[this.idx(i + 1, j)];
            const uL = this.solid[this.idx(i - 1, j)] ? 0 : this.u[this.idx(i - 1, j)];
            const vT = this.solid[this.idx(i, j + 1)] ? 0 : this.v[this.idx(i, j + 1)];
            const vB = this.solid[this.idx(i, j - 1)] ? 0 : this.v[this.idx(i, j - 1)];
            this.div[id] = -0.5 * h * (uR - uL + vT - vB);
            this.p[id] = 0;
          }
        }
        for (let k = 0; k < iter; k++) {
          for (let j = 1; j < n - 1; j++) {
            for (let i = 1; i < n - 1; i++) {
              const id = this.idx(i, j);
              if (this.solid[id]) continue;
              const pR = this.solid[this.idx(i + 1, j)] ? this.p[id] : this.p[this.idx(i + 1, j)];
              const pL = this.solid[this.idx(i - 1, j)] ? this.p[id] : this.p[this.idx(i - 1, j)];
              const pT = this.solid[this.idx(i, j + 1)] ? this.p[id] : this.p[this.idx(i, j + 1)];
              const pB = this.solid[this.idx(i, j - 1)] ? this.p[id] : this.p[this.idx(i, j - 1)];
              this.p[id] = (this.div[id] + pL + pR + pB + pT) / 4;
            }
          }
        }
        for (let j = 1; j < n - 1; j++) {
          for (let i = 1; i < n - 1; i++) {
            const id = this.idx(i, j);
            if (this.solid[id]) { this.u[id] = 0; this.v[id] = 0; continue; }
            const pR = this.p[this.idx(i + 1, j)];
            const pL = this.p[this.idx(i - 1, j)];
            const pT = this.p[this.idx(i, j + 1)];
            const pB = this.p[this.idx(i, j - 1)];
            this.u[id] -= 0.5 * (pR - pL) / h;
            this.v[id] -= 0.5 * (pT - pB) / h;
          }
        }
      }
      step(dt, windVec, windStrength) {
        this.addWind(windVec.x, windVec.z, windStrength);
        this.advect(dt);
        this.project(26);
      }
      reset() {
        this.u.fill(0); this.v.fill(0); this.p.fill(0); this.div.fill(0);
      }
    }

    class ParticleStream {
      constructor(scene, solver, count = 1000) {
        this.scene = scene;
        this.solver = solver;
        this.count = count;
        this.particles = new Array(count).fill(0).map(() => this.randomParticle());
        this.mesh = null;
        this.dummy = new THREE.Object3D();
        this.color = new THREE.Color();
        this.createMesh();
      }
      randomParticle() {
        return {
          x: (Math.random() - 0.5) * WORLD_SIZE,
          z: (Math.random() - 0.5) * WORLD_SIZE,
          y: 0.35 + Math.random() * 0.4
        };
      }
      createMesh() {
        if (this.mesh) this.scene.remove(this.mesh);
        const geo = new THREE.SphereGeometry(0.08, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
        this.mesh = new THREE.InstancedMesh(geo, mat, this.count);
        this.mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        this.mesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(this.count * 3), 3);
        this.scene.add(this.mesh);
      }
      setCount(count) {
        this.count = count;
        this.particles = new Array(count).fill(0).map(() => this.randomParticle());
        this.createMesh();
      }
      speedToColor(speed, maxSpeed = 7) {
        const t = Math.min(1, speed / maxSpeed);
        if (t < 0.5) {
          return this.color.setRGB(0.2 + t * 0.2, 0.5 + t * 0.8, 1.0);
        }
        const tt = (t - 0.5) * 2;
        return this.color.setRGB(0.6 + tt * 0.4, 0.9 + tt * 0.1, 1.0);
      }
      update(dt) {
        for (let i = 0; i < this.count; i++) {
          const p = this.particles[i];
          const vx = this.solver.sample(this.solver.u, p.x, p.z);
          const vz = this.solver.sample(this.solver.v, p.x, p.z);
          p.x += vx * dt * 4.2;
          p.z += vz * dt * 4.2;
          if (p.x > HALF_WORLD) p.x = -HALF_WORLD;
          if (p.x < -HALF_WORLD) p.x = HALF_WORLD;
          if (p.z > HALF_WORLD) p.z = -HALF_WORLD;
          if (p.z < -HALF_WORLD) p.z = HALF_WORLD;
          const speed = Math.hypot(vx, vz);
          const s = 0.35 + Math.min(speed / 8, 1.6);
          this.dummy.position.set(p.x, p.y, p.z);
          this.dummy.scale.setScalar(s);
          this.dummy.updateMatrix();
          this.mesh.setMatrixAt(i, this.dummy.matrix);
          this.mesh.setColorAt(i, this.speedToColor(speed));
        }
        this.mesh.instanceMatrix.needsUpdate = true;
        if (this.mesh.instanceColor) this.mesh.instanceColor.needsUpdate = true;
      }
      setVisible(v) { this.mesh.visible = v; }
    }

    class Streamlines {
      constructor(scene, solver) {
        this.scene = scene;
        this.solver = solver;
        this.group = new THREE.Group();
        scene.add(this.group);
        this.elapsed = 0;
      }
      refresh() {
        this.group.clear();
        const seeds = 11;
        const spacing = WORLD_SIZE / (seeds - 1);
        for (let z = 0; z < seeds; z++) {
          for (let x = 0; x < seeds; x++) {
            let px = -HALF_WORLD + x * spacing;
            let pz = -HALF_WORLD + z * spacing;
            const points = [];
            for (let s = 0; s < 44; s++) {
              const vx = this.solver.sample(this.solver.u, px, pz);
              const vz = this.solver.sample(this.solver.v, px, pz);
              points.push(new THREE.Vector3(px, 0.18, pz));
              px += vx * 0.15;
              pz += vz * 0.15;
              if (Math.abs(px) > HALF_WORLD || Math.abs(pz) > HALF_WORLD) break;
            }
            if (points.length > 1) {
              const geom = new THREE.BufferGeometry().setFromPoints(points);
              const mat = new THREE.LineBasicMaterial({ color: 0x7dd3fc, transparent: true, opacity: 0.48 });
              this.group.add(new THREE.Line(geom, mat));
            }
          }
        }
      }
      update(dt) {
        this.elapsed += dt;
        if (this.elapsed >= 2.0) {
          this.refresh();
          this.elapsed = 0;
        }
      }
      setVisible(v) { this.group.visible = v; }
    }

    class HeatmapLayer {
      constructor(scene, colorizer, y = 0.05) {
        this.scene = scene;
        this.colorizer = colorizer;
        this.canvas = document.createElement('canvas');
        this.canvas.width = GRID;
        this.canvas.height = GRID;
        this.ctx = this.canvas.getContext('2d');
        this.image = this.ctx.createImageData(GRID, GRID);
        this.texture = new THREE.CanvasTexture(this.canvas);
        this.texture.minFilter = THREE.LinearFilter;
        this.texture.magFilter = THREE.LinearFilter;
        this.material = new THREE.MeshBasicMaterial({ map: this.texture, transparent: true, opacity: 0.72, side: THREE.DoubleSide });
        this.mesh = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 1, 1), this.material);
        this.mesh.rotation.x = -Math.PI / 2;
        this.mesh.position.y = y;
        scene.add(this.mesh);
      }
      update(fieldProvider) {
        const data = this.image.data;
        for (let j = 0; j < GRID; j++) {
          for (let i = 0; i < GRID; i++) {
            const id = i + j * GRID;
            const val = fieldProvider(i, j, id);
            const [r, g, b] = this.colorizer(val);
            const p = id * 4;
            data[p] = r;
            data[p + 1] = g;
            data[p + 2] = b;
            data[p + 3] = 220;
          }
        }
        this.ctx.putImageData(this.image, 0, 0);
        this.texture.needsUpdate = true;
      }
      setVisible(v) { this.mesh.visible = v; }
    }

    const viewport = document.getElementById('viewport');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(58, viewport.clientWidth / viewport.clientHeight, 0.1, 500);
    camera.position.set(30, 25, 30);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewport.clientWidth, viewport.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    viewport.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const transformControls = new TransformControls(camera, renderer.domElement);
    scene.add(transformControls);
    transformControls.addEventListener('dragging-changed', (e) => controls.enabled = !e.value);

    scene.add(new THREE.HemisphereLight(0xb3e5ff, 0x1f2937, 1.0));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(20, 40, 10);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.4, roughness: 0.75, side: THREE.DoubleSide })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const grid = new THREE.GridHelper(WORLD_SIZE, 20, 0x155e75, 0x1e293b);
    grid.position.y = 0.01;
    scene.add(grid);

    const windArrow = new THREE.ArrowHelper(new THREE.Vector3(-1, 0, 0), new THREE.Vector3(0, 5, 0), 10, 0x06b6d4, 2.4, 1.1);
    scene.add(windArrow);

    const solver = new FluidSolver(GRID);
    const particles = new ParticleStream(scene, solver, 1000);
    const streamlines = new Streamlines(scene, solver);

    const velocityMap = new HeatmapLayer(scene, (v) => {
      const t = Math.min(1, v / 8);
      let r = 0, g = 0, b = 0;
      if (t < 0.33) {
        const k = t / 0.33;
        r = 0; g = Math.floor(255 * k); b = 255;
      } else if (t < 0.66) {
        const k = (t - 0.33) / 0.33;
        r = Math.floor(255 * k); g = 255; b = Math.floor(255 * (1 - k));
      } else {
        const k = (t - 0.66) / 0.34;
        r = 255; g = Math.floor(255 * (1 - k)); b = 0;
      }
      return [r, g, b];
    }, 0.03);

    const pressureMap = new HeatmapLayer(scene, (v) => {
      const t = Math.max(0, Math.min(1, (v + 2) / 4));
      if (t < 0.5) {
        const k = t / 0.5;
        return [Math.floor(255 * k), Math.floor(255 * k), 255];
      }
      const k = (t - 0.5) / 0.5;
      return [255, Math.floor(255 * (1 - k)), Math.floor(255 * (1 - k))];
    }, 0.04);
    pressureMap.setVisible(false);

    const obstacles = [];
    let selected = null;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const material = new THREE.MeshStandardMaterial({ color: 0x9ca3af, metalness: 0.8, roughness: 0.25 });

    function addObstacle(type) {
      let geometry;
      if (type === 'sphere') geometry = new THREE.SphereGeometry(1, 24, 20);
      else if (type === 'cylinder') geometry = new THREE.CylinderGeometry(1, 1, 2, 24);
      else geometry = new THREE.BoxGeometry(2, 2, 2);
      const mesh = new THREE.Mesh(geometry, material.clone());
      mesh.material.color.setHSL(Math.random(), 0.35, 0.62);
      mesh.position.set((Math.random() - 0.5) * 10, 1.3, (Math.random() - 0.5) * 10);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      obstacles.push(mesh);
      selectObject(mesh);
    }

    function selectObject(obj) {
      selected = obj;
      transformControls.attach(obj);
      syncTransformInputs();
    }

    function syncTransformInputs() {
      if (!selected) return;
      posX.value = selected.position.x.toFixed(2);
      posY.value = selected.position.y.toFixed(2);
      posZ.value = selected.position.z.toFixed(2);
      scaleX.value = selected.scale.x.toFixed(2);
      scaleY.value = selected.scale.y.toFixed(2);
      scaleZ.value = selected.scale.z.toFixed(2);
    }

    function applyTransformInputs() {
      if (!selected) return;
      selected.position.set(parseFloat(posX.value), parseFloat(posY.value), parseFloat(posZ.value));
      selected.scale.set(
        Math.max(0.1, parseFloat(scaleX.value)),
        Math.max(0.1, parseFloat(scaleY.value)),
        Math.max(0.1, parseFloat(scaleZ.value))
      );
    }

    function removeSelected() {
      if (!selected) return;
      const idx = obstacles.indexOf(selected);
      if (idx >= 0) obstacles.splice(idx, 1);
      scene.remove(selected);
      transformControls.detach();
      selected = null;
    }

    renderer.domElement.addEventListener('pointerdown', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(obstacles, false);
      if (hits.length) selectObject(hits[0].object);
    });

    transformControls.addEventListener('objectChange', syncTransformInputs);

    const addObjectBtn = document.getElementById('addObject');
    const deleteObjectBtn = document.getElementById('deleteObject');
    const posX = document.getElementById('posX');
    const posY = document.getElementById('posY');
    const posZ = document.getElementById('posZ');
    const scaleX = document.getElementById('scaleX');
    const scaleY = document.getElementById('scaleY');
    const scaleZ = document.getElementById('scaleZ');

    addObjectBtn.onclick = () => {
      const type = document.querySelector('input[name="shape"]:checked').value;
      addObstacle(type);
    };
    deleteObjectBtn.onclick = removeSelected;
    [posX, posY, posZ, scaleX, scaleY, scaleZ].forEach(input => {
      input.addEventListener('change', applyTransformInputs);
      input.addEventListener('input', applyTransformInputs);
    });

    const azimuth = document.getElementById('azimuth');
    const elevation = document.getElementById('elevation');
    const windSpeed = document.getElementById('windSpeed');
    const azimuthLabel = document.getElementById('azimuthLabel');
    const elevationLabel = document.getElementById('elevationLabel');
    const speedLabel = document.getElementById('speedLabel');

    function getWindVector() {
      const az = THREE.MathUtils.degToRad(parseFloat(azimuth.value));
      const el = THREE.MathUtils.degToRad(parseFloat(elevation.value));
      const speed = parseFloat(windSpeed.value) / 12;
      const v = new THREE.Vector3(
        Math.cos(el) * Math.cos(az),
        Math.sin(el),
        Math.cos(el) * Math.sin(az)
      );
      return v.multiplyScalar(speed);
    }

    function updateWindLabels() {
      azimuthLabel.textContent = `${azimuth.value}°`;
      elevationLabel.textContent = `${elevation.value}°`;
      speedLabel.textContent = windSpeed.value;
    }
    [azimuth, elevation, windSpeed].forEach(el => el.addEventListener('input', updateWindLabels));
    updateWindLabels();

    const showParticles = document.getElementById('showParticles');
    const showStreamlines = document.getElementById('showStreamlines');
    const showVelocity = document.getElementById('showVelocity');
    const showPressure = document.getElementById('showPressure');
    const particleCount = document.getElementById('particleCount');

    showParticles.onchange = () => particles.setVisible(showParticles.checked);
    showStreamlines.onchange = () => streamlines.setVisible(showStreamlines.checked);
    showVelocity.onchange = () => velocityMap.setVisible(showVelocity.checked);
    showPressure.onchange = () => pressureMap.setVisible(showPressure.checked);
    particleCount.onchange = () => particles.setCount(Math.max(500, Math.min(2000, parseInt(particleCount.value, 10) || 1000)));

    const toggleSim = document.getElementById('toggleSim');
    const resetSim = document.getElementById('resetSim');
    let running = true;
    toggleSim.onclick = () => {
      running = !running;
      toggleSim.textContent = running ? '⏸ 一時停止' : '▶ 開始';
    };
    resetSim.onclick = () => solver.reset();

    let frame = 0;
    const fpsEl = document.getElementById('fps');
    let fpsFrames = 0;
    let fpsTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      const wind = getWindVector();
      windArrow.setDirection(wind.clone().normalize());
      windArrow.setLength(6 + wind.length() * 1.2, 1.8, 0.9);

      solver.setSolidFromMeshes(obstacles);
      if (running) solver.step(DT, wind, parseFloat(windSpeed.value));

      if (showParticles.checked && running) particles.update(DT);
      if (showStreamlines.checked && running) streamlines.update(DT);

      if (frame % 4 === 0) {
        if (showVelocity.checked) {
          velocityMap.update((i, j, id) => Math.hypot(solver.u[id], solver.v[id]));
        }
        if (showPressure.checked) {
          pressureMap.update((i, j, id) => solver.p[id]);
        }
      }

      renderer.render(scene, camera);
      frame++;

      fpsFrames++;
      const now = performance.now();
      if (now - fpsTime > 500) {
        const fps = Math.round((fpsFrames * 1000) / (now - fpsTime));
        fpsEl.textContent = `FPS: ${fps}`;
        fpsFrames = 0;
        fpsTime = now;
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = viewport.clientWidth / viewport.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewport.clientWidth, viewport.clientHeight);
    });

    addObstacle('box');
    addObstacle('sphere');
    streamlines.refresh();
    animate();
  </script>
</body>
</html>
